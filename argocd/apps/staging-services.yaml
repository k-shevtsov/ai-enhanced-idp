apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-services
  namespace: argocd
spec:
  project: idp-project
  source:
    repoURL: https://github.com/k-shevtsov/ai-enhanced-idp
    targetRevision: HEAD
    path: gitops/overlays/staging
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
