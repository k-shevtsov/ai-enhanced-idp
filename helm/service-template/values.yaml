# Default values — overridden per-service via gitops/overlays/
service:
  name: "app"
  namespace: "dev"
  environment: "dev"

image:
  repository: "ghcr.io/k-shevtsov/app"
  tag: "latest"
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

service:
  port: 8080
  targetPort: 8080

monitoring:
  enabled: true
  port: 8080
  path: /metrics

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
